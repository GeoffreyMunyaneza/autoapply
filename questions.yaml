# questions.yaml — Pre-answered screening questions for AutoApply
#
# Pattern inspired by EasyApplyJobsBot / AIHawk.
# These answers are used BEFORE calling Claude, so they are fast, free, and
# consistent across every application.
#
# HOW IT WORKS:
#   The submitter checks each ATS question text against the keys here
#   (case-insensitive substring match). First match wins.
#   Add your own entries — they override the built-in fallbacks.
#
# FORMAT:
#   "question fragment": "answer"
#
# For radio/select questions the answer must exactly match one of the option labels.

