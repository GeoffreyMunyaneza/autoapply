# AutoApply configuration
# Secrets belong in .env, not here.

user_profile:
  name: "Your Name"
  background: |
    [Your title] with [X]+ years of [your domain] experience.
    Key strengths: [skill1], [skill2], [skill3].
    Previous roles: [Company 1 - role], [Company 2 - role].
    Education: [Degree] from [School]; [Degree] from [School].
    Work authorization: [OPT / H1B / EAD / US Citizen / Green Card].
    Location: [City, State].
  differentiator_keywords:
    - "your unique keyword 1"
    - "your unique keyword 2"
  ml_match_profile: >
    Machine learning engineer with experience in deep learning, computer vision, NLP,
    LLMs, PyTorch, TensorFlow, MLOps, model deployment, and generative AI.
    Looking for ML Engineer, AI Engineer, Applied Scientist, or Data Scientist roles.
  pm_match_profile: >
    Technical product manager with experience in AI/ML product strategy, roadmap,
    stakeholder management, agile, go-to-market, and cross-functional leadership.
    Looking for Senior Product Manager or Technical PM roles in AI/ML.

search:
  queries:
    - query: "Machine Learning Engineer"
      resume_type: ml
    - query: "AI Engineer"
      resume_type: ml
    - query: "Data Scientist"
      resume_type: ml
    - query: "Applied Scientist"
      resume_type: ml
    - query: "ML Engineer LLM"
      resume_type: ml
    - query: "Technical Product Manager AI"
      resume_type: pm
    - query: "Product Manager Machine Learning"
      resume_type: pm
  sources:
    - linkedin
    - indeed
    - zip_recruiter
    - google
  location: "United States"
  remote_only: false
  results_per_query: 15
  hours_old: 24
  job_type: fulltime
  distance_miles: 50
  easy_apply_only: false
  proxies: []

filter:
  exclude_keywords:
    - "staff engineer"
    - "principal engineer"
    - "VP of"
    - "Vice President"
    - "C-suite"
    - "security clearance required"
    - "TS/SCI"
    - "internship"
    - "intern "
  min_description_length: 300

resumes:
  ml: "Your_ML_Resume.docx"
  pm: "Your_PM_Resume.docx"

output:
  tracker_file: "output/tracker_v2.xlsx"
  resumes_folder: "output/resumes"
  pending_folder: "output/pending"

claude:
  model: "claude-3-5-haiku-20241022"
  max_tokens: 4096

cover_letter:
  auto_generate: true

review:
  auto_approve: true

notifications:
  windows_toast: true
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587

screening:
  questions_file: "questions.yaml"

submission:
  enabled: false
  headless: false
  review_before_submit: true
  screenshots_folder: "output/screenshots"
  profile:
    first_name: "Your"
    last_name: "Name"
    linkedin: "https://www.linkedin.com/in/yourprofile"
    github: ""
    portfolio: ""
    current_company: "Your Current Employer"
    work_authorization: "US Citizen"
    requires_sponsorship: false
